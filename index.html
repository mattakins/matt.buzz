<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matt Akins</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <main class="container">
    <!-- Profile Header -->
    <header class="profile">
      <img
        src="https://framerusercontent.com/images/HDYCtFPD9ZtkKLNfkY0C8fUbdOA.jpeg?scale-down-to=512"
        alt="Matt Akins"
        class="profile__avatar"
      >
      <div class="profile__info">
        <h1 class="profile__name">Matt Akins</h1>
        <p class="profile__bio">Meta Ads & DTC Ecom Leader. Performance marketing, creative testing, and conversion systems.</p>
      </div>
      <button class="profile__contact" onclick="copyEmail()">Contact</button>
    </header>

    <!-- Bento Grid -->
    <section class="bento">
      <!-- Left: Family Photo -->
      <div class="bento__left">
        <div class="card card--hero">
          <img src="assets/family.jpg" alt="Matt with family" class="card__image">
        </div>
      </div>

      <!-- Right: All other cards -->
      <div class="bento__right">
        <a href="#about" class="card card--about">
          <div class="card__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>
          </div>
        </a>

        <a href="#portfolio" class="card card--portfolio">
          <div class="card__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
          </div>
        </a>

        <a href="#stack" class="card card--stack">
          <div class="card__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
          </div>
        </a>

        <a href="https://drive.google.com/file/d/167um-hT0g-Xc2ClPDNb0z40feV9LT7e2/view" target="_blank" class="card card--resume">
          <div class="card__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          </div>
        </a>

        <button class="card card--email" onclick="copyEmail()">
          <div class="card__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          </div>
        </button>

        <a href="https://linkedin.com/in/matthewakins" target="_blank" class="card card--linkedin">
          <div class="card__icon">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
          </div>
        </a>

        <a href="https://twitter.com/mattakins" target="_blank" class="card card--twitter">
          <div class="card__icon">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
          </div>
        </a>
      </div>
    </section>
  </main>

  <!-- Copy Email Modal -->
  <div class="modal" id="emailModal">
    <div class="modal__content">
      <span class="modal__email">matt@matt.buzz</span>
      <span class="modal__message">Email copied to clipboard!</span>
    </div>
  </div>

  <script>
    function copyEmail() {
      navigator.clipboard.writeText('matt@matt.buzz');
      const modal = document.getElementById('emailModal');
      modal.classList.add('modal--show');
      setTimeout(() => modal.classList.remove('modal--show'), 2000);
    }
  </script>
  <script src="script.js"></script>
</body>
</html>
